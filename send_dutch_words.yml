name: Send Dutch Words

on:
  schedule:
    - cron: "0 10 * * 1,3" # Monday and Wednesday at 10:00 UTC (Amsterdam Winter Time)
    - cron: "0 11 * * 1,3" # Monday and Wednesday at 11:00 UTC (Amsterdam Summer Time)
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write # Needed for the git commit/push to sent_words.json

jobs:
  send_words:
    runs-on: ubuntu-latest # Uses a fresh Ubuntu environment each time

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7 # Check out your repository code
        with:
          persist-credentials: true # Needed for pushing changes back to the repo

      - name: Set up Python
        uses: actions/setup-python@v5.1.1 # Set up Python 3.11
        with:
          python-version: "3.11"

      - name: Install minimal dependencies (json, os, random, re are built-in)
        run: |
          # Only installing requests if it was absolutely needed, but it's removed in this minimal test
          # python -m pip install --upgrade pip
          # pip install requests # This line is commented out as requests is not used in this test

      - name: Run ultra-minimal Python script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }} # Pass Telegram bot token
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}     # Pass Telegram chat ID
          GITHUB_ACTIONS: "true" # Indicate that the script is running in GitHub Actions
        run: |
          python <<EOF
# This is an ultra-minimal script to diagnose the SyntaxError.
# All complex logic, external API calls, and error handling have been removed.

import os
import json # For loading/saving sent_words.json
import random # For random.randint
import re # For clean_text

# Global constants (kept for structure, but not all are used in this minimal test)
BOT_TOKEN = os.getenv("TELEGRAM_BOT_TOKEN")
CHAT_ID = os.getenv("TELEGRAM_CHAT_ID")
SENT_FILE = "sent_words.json"
MIN_WORDS = 5
MAX_WORDS = 10

# --- Helper Functions (EXTREMELY SIMPLIFIED - NO TRY/EXCEPT) ---

def load_json_file(filename, default):
    # Simplified: no error handling, just load or return default
    if not os.path.exists(filename):
        return default
    with open(filename, "r", encoding="utf-8") as f:
        return json.load(f)

def save_json_file(filename, data):
    # Simplified: no error handling
    with open(filename, "w", encoding="utf-8") as f:
        json.dump(data, f, ensure_ascii=False, indent=2)

def is_correct_local_time():
    # Always return True for this syntax test
    return True

def fetch_frequency_words():
    # Simulate returning a list of words for testing
    return ["testword1", "testword2", "testword3", "testword4", "testword5", "testword6", "testword7", "testword8", "testword9", "testword10"]

def get_wiktionary_info(word):
    # Simulate returning data for testing
    return {
        "word": word,
        "pos": "noun",
        "meaning": "a test meaning for " + word,
        "example": "This is a test sentence for " + word + "."
    }

# THIS IS THE TARGET LINE WHERE THE SYNTAXERROR OCCURS
def clean_text(text):
    if not text:
        return None
    # Just basic cleaning for this test
    text = re.sub(r"<[^>]+>", "", text)
    text = re.sub(r"\s+", " ", text).strip()
    return text

def build_entry_data(word):
    info = get_wiktionary_info(word)
    if info:
        meaning = clean_text(info.get("meaning"))
        pos = clean_text(info.get("pos"))
        example = clean_text(info.get("example"))
        return {"word": word, "meaning": meaning, "pos": pos, "example": example}
    return None

def pick_quality_words(all_words, sent_words_history, desired_count):
    # Simplified word picking
    selected_entries = []
    num_to_pick = min(desired_count, len(all_words))
    for i in range(num_to_pick):
        word = all_words[i]
        entry = build_entry_data(word)
        if entry:
            selected_entries.append(entry)
    selected_words_for_history = [entry["word"] for entry in selected_entries]
    return selected_entries, selected_words_for_history

def format_message(entries):
    # Simplified message formatting
    today = "Test Day, 01 January 2024"
    lines = [f"🇳🇱 Dutch Vocabulary — {today}\n"]
    for i, e in enumerate(entries, start=1):
        pos_part = f" ({e['pos'].capitalize()})" if e.get("pos") else ""
        meaning_text = e['meaning'] if e.get('meaning') else "Meaning not found."
        example_text = e['example'] if e.get('example') else f"Voorbeeld: Ik gebruik het woord '{e['word']}' in een zin."
        lines.append(
            f"{i}. *{e['word']}*{pos_part}\n"
            f"   Meaning: {meaning_text}\n"
            f"   _{example_text}_\n"
        )
    lines.append("Veel succes met leren! 📚")
    return "\n".join(lines)

def send_telegram_message(token, chat_id, text):
    # Simulate sending
    print("Telegram message simulated successfully.")

def git_commit_and_push():
    # Simulate git operations
    print("Git commit/push simulated successfully.")

def main():
    if not BOT_TOKEN or not CHAT_ID:
        print("TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID not set. Simulating.")
        # For this test, we won't exit, we'll just print
    
    if not is_correct_local_time():
        print("Not correct local time. Exiting.")
        return

    print("Starting ultra-minimal vocabulary generation and sending.")
    sent_words_history = load_json_file(SENT_FILE, [])
    print(f"Loaded {len(sent_words_history)} previously sent words.")

    all_words = fetch_frequency_words()
    if not all_words:
        print("Could not get frequency list. Exiting.")
        return

    desired_word_count = random.randint(MIN_WORDS, MAX_WORDS)
    
    final_entries, words_for_history = pick_quality_words(all_words, sent_words_history, desired_word_count)

    if not final_entries:
        print("No words could be selected. Exiting.")
        return

    print(f"Final selected words: {[entry['word'] for entry in final_entries]}")

    message = format_message(final_entries)
    send_telegram_message(BOT_TOKEN, CHAT_ID, message)
    print("Telegram message sent successfully.")

    sent_words_history.extend(words_for_history)
    save_json_file(SENT_FILE, sent_words_history)
    print(f"Updated sent_words.json with {len(words_for_history)} new words. Total sent: {len(sent_words_history)}")

    if os.getenv("GITHUB_ACTIONS") == "true":
        git_commit_and_push()

if __name__ == "__main__":
    main()
EOF
